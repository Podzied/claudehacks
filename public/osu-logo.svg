<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260">
  <!-- Block O - chunky octagon, taller than wide, with white cutout -->
  <g transform="translate(150, 80)">
    <!-- Scarlet outer block (octagonal) with subtle gray outline -->
    <path d="M-26,-68 L26,-68 L60,-34 L60,34 L26,68 L-26,68 L-60,34 L-60,-34 Z"
          fill="#BB0000" stroke="#4A4A4A" stroke-width="1.5"/>
    <!-- White inner cutout (same octagonal shape, scaled down ~50%) with gray outline -->
    <path d="M-13,-34 L13,-34 L30,-17 L30,17 L13,34 L-13,34 L-30,17 L-30,-17 Z"
          fill="white" stroke="#4A4A4A" stroke-width="1.5"/>
  </g>

  <!-- Top horizontal rule -->
  <line x1="30" y1="178" x2="270" y2="178" stroke="#666666" stroke-width="2"/>

  <!-- THE OHIO STATE -->
  <text x="150" y="208" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="400" fill="#666666" letter-spacing="3">THE OHIO STATE</text>

  <!-- UNIVERSITY -->
  <text x="150" y="240" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="400" fill="#666666" letter-spacing="3">UNIVERSITY</text>

  <!-- Bottom horizontal rule -->
  <line x1="60" y1="252" x2="240" y2="252" stroke="#666666" stroke-width="2"/>
</svg>
